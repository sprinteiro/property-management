# H2 in-memory database

# JPA - Hibernate configuration
# Disable DDL generation as provided schema.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.jpa.generate-ddl=false
# In-memory database (embedded | always | never) embedded only in-memory database H2, Derby
spring.sql.init.mode=embedded

# H2 database configuration
spring.datasource.url=jdbc:h2:mem:propertymanagement
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
debug=false
logging.level.org.springframework.security=info

# OpenTelemetry Local Configuration for H2 profile
# Using 127.0.0.1 explicitly to avoid IPv6 issues on Ubuntu/Linux
management.otlp.metrics.export.url=http://127.0.0.1:4318/v1/metrics
management.opentelemetry.tracing.export.otlp.endpoint=http://127.0.0.1:4318/v1/traces
management.opentelemetry.logging.export.otlp.endpoint=http://127.0.0.1:4318/v1/logs

# Ensure tracing is enabled and sampling is at 100% for local debugging
management.tracing.sampling.probability=1.0

# Native Spring Boot JDBC Observation (Spring Boot 4.x)
# This enables tracing and metrics for all JDBC operations
management.tracing.enabled=true
micrometer.observation.annotations.enabled=true
spring.datasource.output.metrics.export.enabled=true
management.observations.key-values.repository.jdbc.enabled=true
