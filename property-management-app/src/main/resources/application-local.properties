spring.application.name=property-management
server.port=8288

# Configuration for testing purposes
test.endpoints=on
# Disable them to prevent errors in E-mail and SMS a per logic in EmailStubNotificationSender and SmsStubNotificationSender
test.notification.stub.email.error.enabled=on
test.notification.stub.sms.error.enabled=on

# Database configuration (Local MySql for local profile)
spring.datasource.url=jdbc:mysql://localhost:3306/propertymanagement
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging
logging.level.org.propertymanagement=debug
logging.level.org.springframework.web=info
logging.level.org.springframework.security=info

# Virtual Threads
spring.threads.virtual.enabled=true

# OpenTelemetry Local Configuration
# Using 127.0.0.1 explicitly to avoid IPv6 issues on Ubuntu/Linux
management.otlp.metrics.export.url=http://127.0.0.1:4318/v1/metrics
management.opentelemetry.tracing.export.otlp.endpoint=http://127.0.0.1:4318/v1/traces
management.opentelemetry.logging.export.otlp.endpoint=http://127.0.0.1:4318/v1/logs

# Ensure tracing is enabled and sampling is at 100% for local debugging
management.tracing.sampling.probability=1.0
management.tracing.enabled=true

# Native Spring Boot JDBC Observation (Spring Boot 4.x)
management.jdbc.observation.enabled=true
